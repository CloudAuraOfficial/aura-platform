name: CI/CD

# Deploy is handled out-of-band by a host-side cron watcher on the VPS:
# /home/rogerclaude/aura-deploy-watch.sh polls .deployed-sha vs HEAD every
# minute and runs scripts/deploy.sh when they diverge. CI's only job is
# to gate bad code from reaching main.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: "8.0.x"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal
