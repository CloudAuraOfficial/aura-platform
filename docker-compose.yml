services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    mem_limit: 512m
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aura}
      POSTGRES_USER: ${POSTGRES_USER:-aura}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aura}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    mem_limit: 256m
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  aura_api:
    build:
      context: .
      target: api
    container_name: aura_api
    restart: unless-stopped
    mem_limit: 512m
    ports:
      - "127.0.0.1:8006:8000"
    env_file: .env
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://172.17.0.1:4317}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  aura_worker:
    build:
      context: .
      target: worker
    container_name: aura_worker
    restart: unless-stopped
    mem_limit: 512m
    ports:
      - "127.0.0.1:9091:9091"
    env_file: .env
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://172.17.0.1:4317}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
